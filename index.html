<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Banner Maker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>

  <header>
    <div class="logo">
      <span>BannerMaker</span>
    </div>
    <button id="exportBtn" class="btn-export">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1v8M4 6l3 3 3-3M2 10v1a1 1 0 001 1h8a1 1 0 001-1v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Export PNG
    </button>
  </header>

  <main>
    <!-- Controls Panel (left) -->
    <aside class="panel" id="controlsPanel">
      <div class="panel-scroll">

        <!-- Dimensions -->
        <div class="group" data-group="dimensions">
          <div class="group-head">
            <span class="group-label">Dimensions</span>
            <button class="btn-reset-group" title="Reset dimensions">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M10.5 2A5 5 0 1 0 11 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M8 0.5L11 2.5l-3 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>

          <div class="dim-row">
            <label class="field">
              <span>Width <em class="unit">px</em></span>
              <input type="number" id="bWidth" value="1280" min="100" max="4000" step="1" />
            </label>
            <button id="lockAspect" class="lock-btn" title="Link aspect ratio">
              <svg class="icon-unlink" width="15" height="15" viewBox="0 0 15 15" fill="none">
                <path d="M5.5 7.5h1m3 0h1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                <path d="M5.5 5H4a3 3 0 000 6h1.5M9.5 5H11a3 3 0 010 6H9.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
              <svg class="icon-link" width="15" height="15" viewBox="0 0 15 15" fill="none" style="display:none">
                <path d="M5.5 7.5h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                <path d="M5.5 5H4a3 3 0 000 6h1.5M9.5 5H11a3 3 0 010 6H9.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
            </button>
            <label class="field">
              <span>Height <em class="unit">px</em></span>
              <input type="number" id="bHeight" value="640" min="100" max="4000" step="1" />
            </label>
          </div>

          <label class="field toggle-row">
            <span>Scale Visuals On Resize</span>
            <label class="toggle">
              <input type="checkbox" id="scaleVisuals" />
              <span class="track"></span>
            </label>
          </label>

          <label class="field">
            <span>Border Radius <em class="unit">px</em></span>
            <div class="slider-row">
              <input type="range" id="bRadius" min="0" max="200" value="80" />
              <input type="number" id="bRadiusNum" value="80" min="0" max="200" class="num-sync" />
            </div>
          </label>
        </div>

        <!-- Text -->
        <div class="group" data-group="text">
          <div class="group-head">
            <span class="group-label">Text</span>
            <button class="btn-reset-group" title="Reset text">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M10.5 2A5 5 0 1 0 11 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M8 0.5L11 2.5l-3 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>

          <label class="field">
            <span>Heading</span>
            <input type="text" id="bTitle" value="your-repo" placeholder="Repo / project name" />
          </label>
          <div class="row-2">
            <label class="field">
              <span>Font Family</span>
              <select id="titleFontFamily" class="font-select"></select>
            </label>
            <label class="field">
              <span>Weight</span>
              <select id="titleFontWeight" class="font-select">
                <option value="300">Light · 300</option>
                <option value="400">Book · 400</option>
                <option value="500">Medium · 500</option>
                <option value="700" selected>Bold · 700</option>
                <option value="900">Black · 900</option>
              </select>
            </label>
          </div>

          <label class="field">
            <span>Subtext</span>
            <input type="text" id="bSub" value="A blazing-fast open source tool." placeholder="Short description" />
          </label>
          <div class="row-2">
            <label class="field">
              <span>Font Family</span>
              <select id="subFontFamily" class="font-select"></select>
            </label>
            <label class="field">
              <span>Weight</span>
              <select id="subFontWeight" class="font-select">
                <option value="300" selected>Light · 300</option>
                <option value="400">Book · 400</option>
                <option value="500">Medium · 500</option>
                <option value="700">Bold · 700</option>
                <option value="900">Black · 900</option>
              </select>
            </label>
          </div>

          <div class="gf-loader">
            <input type="text" id="gfInput" placeholder="Any Google Font name…" autocomplete="off" />
            <button id="gfLoad" class="btn-load-font">Load</button>
          </div>

          <div class="row-2">
            <label class="field">
              <span>Heading Size <em class="unit">px</em></span>
              <input type="number" id="bTitleSize" value="96" min="12" max="300" step="2" />
            </label>
            <label class="field">
              <span>Subtext Size <em class="unit">px</em></span>
              <input type="number" id="bSubSize" value="36" min="8" max="200" step="1" />
            </label>
          </div>
          <div class="row-2">
            <label class="field">
              <span>Heading Color</span>
              <input type="color" id="bTitleColor" value="#ffffff" class="color-swatch" />
            </label>
            <label class="field">
              <span>Subtext Color</span>
              <input type="color" id="bSubColor" value="#a0aec0" class="color-swatch" />
            </label>
          </div>
          <label class="field">
            <span>Text Alignment</span>
            <div class="seg-control" id="textAlign">
              <button data-val="left" class="seg">Left</button>
              <button data-val="center" class="seg active">Center</button>
              <button data-val="right" class="seg">Right</button>
            </div>
          </label>
        </div>

        <!-- Background -->
        <div class="group" data-group="background">
          <div class="group-head">
            <span class="group-label">Background</span>
            <button class="btn-reset-group" title="Reset background">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M10.5 2A5 5 0 1 0 11 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M8 0.5L11 2.5l-3 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>

          <label class="field">
            <span>Color Layer</span>
            <div class="seg-control" id="bgFillType">
              <button data-val="gradient" class="seg active">Gradient</button>
              <button data-val="solid" class="seg">Solid</button>
            </div>
          </label>

          <div id="solidControls" style="display:none">
            <label class="field">
              <span>Color</span>
              <input type="color" id="bgSolid" value="#0d1117" class="color-swatch" />
            </label>
          </div>

          <!-- Gradient -->
          <div id="gradientControls">
            <div class="grad-stops" id="gradStops"></div>
            <div class="grad-actions">
              <button class="btn-ghost half" id="addStop">+ Add Stop</button>
              <button class="btn-ghost half" id="openPresets">✦ Presets</button>
            </div>
            <label class="field" style="margin-top:12px">
              <span>Angle <em class="unit">deg</em></span>
              <div class="slider-row">
                <input type="range" id="gradAngle" min="0" max="360" value="135" />
                <input type="number" id="gradAngleNum" value="135" min="0" max="360" class="num-sync" />
              </div>
            </label>
          </div>

          <label class="field toggle-row">
            <span>Image Layer</span>
            <label class="toggle">
              <input type="checkbox" id="bgImageEnabled" />
              <span class="track"></span>
            </label>
          </label>

          <div id="imageControls" style="display:none">
            <div id="bgImgPreview" class="bg-img-preview">
              <span class="no-img-hint">No image selected</span>
            </div>
            <div class="img-btn-row">
              <button class="btn-ghost half" id="openImagePicker">Browse…</button>
              <label class="btn-ghost half upload-trigger">
                Upload
                <input type="file" id="imgUpload" accept="image/*" style="display:none" />
              </label>
            </div>
            <label class="field" style="margin-top:12px">
              <span>Fit</span>
              <div class="seg-control" id="bgImgFit">
                <button data-val="cover" class="seg active">Cover</button>
                <button data-val="contain" class="seg">Contain</button>
                <button data-val="fill" class="seg">Stretch</button>
              </div>
            </label>
            <label class="field" style="margin-top:12px">
              <span>Image Opacity <em class="unit">%</em></span>
              <div class="slider-row">
                <input type="range" id="bgImageOpacity" min="0" max="100" value="100" />
                <input type="number" id="bgImageOpacityNum" value="100" min="0" max="100" class="num-sync" />
              </div>
            </label>

            <label class="field toggle-row" style="margin-top:6px">
              <span>Overlay Color Layer</span>
              <label class="toggle">
                <input type="checkbox" id="overlayEnabled" checked />
                <span class="track"></span>
              </label>
            </label>

            <div id="overlayControls">
              <label class="field">
                <span>Overlay Blend Mode</span>
                <select id="overlayBlendMode" class="font-select">
                  <option value="source-over">Normal</option>
                  <option value="overlay" selected>Overlay</option>
                  <option value="soft-light">Soft Light</option>
                  <option value="multiply">Multiply</option>
                  <option value="screen">Screen</option>
                  <option value="color-burn">Color Burn</option>
                  <option value="color-dodge">Color Dodge</option>
                  <option value="hard-light">Hard Light</option>
                </select>
              </label>
              <label class="field">
                <span>Overlay Opacity <em class="unit">%</em></span>
                <div class="slider-row">
                  <input type="range" id="overlayOpacity" min="0" max="100" value="35" />
                  <input type="number" id="overlayOpacityNum" value="35" min="0" max="100" class="num-sync" />
                </div>
              </label>
            </div>
          </div>
        </div>

        <!-- Texture -->
        <div class="group" data-group="texture">
          <div class="group-head">
            <span class="group-label">Texture</span>
            <button class="btn-reset-group" title="Reset texture">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M10.5 2A5 5 0 1 0 11 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M8 0.5L11 2.5l-3 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
          <label class="field toggle-row">
            <span>Film grain overlay</span>
            <label class="toggle">
              <input type="checkbox" id="noiseOn" checked />
              <span class="track"></span>
            </label>
          </label>
          <label class="field">
            <span>Grain Opacity <em class="unit">%</em></span>
            <div class="slider-row">
              <input type="range" id="noiseOpacity" min="0" max="100" value="18" />
              <input type="number" id="noiseOpacityNum" value="18" min="0" max="100" class="num-sync" />
            </div>
          </label>
        </div>

      </div><!-- /panel-scroll -->
    </aside>

    <div class="panel-resizer" id="panelResizer" title="Drag to resize panel"></div>

    <!-- Canvas Preview -->
    <section class="preview-section">
      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="bannerCanvas"></canvas>
      </div>
      <p class="canvas-hint">Live preview &mdash; export at full resolution</p>
    </section>
  </main>

  <!-- ===== Gradient Presets Modal ===== -->
  <div id="gradPresetsModal" class="modal-overlay" hidden>
    <div class="modal">
      <div class="modal-hdr">
        <span class="modal-title">Gradient Presets</span>
        <button class="btn-modal-close" data-modal="gradPresetsModal" aria-label="Close">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="preset-grid" id="presetGrid"></div>
    </div>
  </div>

  <!-- ===== Image Picker Modal ===== -->
  <div id="imagePickerModal" class="modal-overlay" hidden>
    <div class="modal modal-wide">
      <div class="modal-hdr">
        <span class="modal-title">Background Image</span>
        <button class="btn-modal-close" data-modal="imagePickerModal" aria-label="Close">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="img-modal-tabs" id="imgModalTabs"></div>
      <div class="img-modal-body" id="imgModalBody"></div>
    </div>
  </div>

  <script type="module" src="scripts/main.js"></script>
</body>
</html>
